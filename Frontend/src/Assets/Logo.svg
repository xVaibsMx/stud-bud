<svg width="280" height="80" viewBox="0 0 280 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="textGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#f472b6" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#22d3ee"/>
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#f472b6"/>
    </filter>
  </defs>

  <!-- Robotic face icon -->
  <g filter="url(#glow)">
    <rect x="10" y="20" width="40" height="40" rx="10" fill="#1e293b" stroke="url(#textGradient)" stroke-width="3"/>
    <circle cx="25" cy="35" r="4" fill="#22d3ee"/>
    <circle cx="35" cy="35" r="4" fill="#f472b6"/>
    <rect x="20" y="45" width="20" height="3" rx="1.5" fill="#94a3b8"/>
  </g>

  <!-- Text -->
  <text x="60" y="52" font-size="32" font-family="Orbitron, sans-serif" fill="url(#textGradient)" filter="url(#glow)">
    Stud-Bud
  </text>
</svg>
